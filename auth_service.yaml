openapi: 3.0.3
info:
  title: Auth Service API
  description: |
    Authentication and authorization service for the kodekuffert.dk platform.
    
    ## Authentication
    Most endpoints require signature-based authentication via the `X-Client-Id` and `X-Signature` headers.
    
    ## User Flow
    1. Admin adds emails to whitelist
    2. User creates account with whitelisted email
    3. User receives confirmation email
    4. User confirms email via link
    5. User can log in and gateway can create its own browser session
    
  version: 1.0.0
  contact:
    name: Kodekuffert.dk Team
    url: https://github.com/kodekuffert-dk/auth-service

servers:
  - url: http://localhost:5000
    description: Local development
  - url: https://auth.kodekuffert.dk
    description: Production

tags:
  - name: User
    description: User account management
  - name: Login
    description: Authentication
  - name: Whitelist
    description: Email whitelist management

paths:
  /user:
    post:
      tags:
        - User
      summary: Create new user
      description: |
        Creates a new user account. The email must be on the whitelist.
        Sends a confirmation email to the user.
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserDto'
      responses:
        '200':
          description: User created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "User created successfully. Continue by confirming email."
        '400':
          description: Email not whitelisted or validation error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Email (user@example.com) is not whitelisted"
        '500':
          description: Failed to send confirmation email
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "User created but failed to send confirmation email. Please contact support."

  /user/confirm-email:
    get:
      tags:
        - User
      summary: Confirm email address
      description: |
        Confirms a user's email address using the token sent via email.
        This endpoint is typically called by clicking the link in the confirmation email.
      operationId: confirmEmail
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
          description: Email confirmation token
          example: "abc123def456"
        - name: email
          in: query
          required: true
          schema:
            type: string
            format: email
          description: User's email address
          example: "user@example.com"
      responses:
        '200':
          description: Email confirmed successfully or already confirmed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Email confirmed successfully. You can now log in."
        '400':
          description: Invalid token or missing parameters
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Invalid or expired confirmation token."
        '404':
          description: User not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "User not found."

  /login:
    post:
      tags:
        - Login
      summary: User login
      description: |
        Authenticates a user and returns the user data needed by the gateway.
        The user's email must be confirmed before they can log in.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginDto'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Missing email or password
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Email og password skal udfyldes."
        '401':
          description: Invalid credentials or email not confirmed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Forkert email eller password."

  /whitelist:
    get:
      tags:
        - Whitelist
      summary: Get all whitelisted emails
      description: Returns all teams and their whitelisted emails with status
      operationId: getWhitelist
      responses:
        '200':
          description: Whitelist retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WhitelistEntriesDto'

    post:
      tags:
        - Whitelist
      summary: Add emails to whitelist
      description: |
        Adds one or more emails to the whitelist for a specific team.
        Users with whitelisted emails can create accounts.
      operationId: addWhitelistEntries
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWhitelistEntriesDto'
      responses:
        '200':
          description: Emails added successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "3 emails added to whitelist for team 'DevTeam'"
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Emails and TeamName are required."

    delete:
      tags:
        - Whitelist
      summary: Remove emails from whitelist
      description: Removes one or more emails from the whitelist
      operationId: deleteWhitelistEntries
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteWhitelistEntriesDto'
      responses:
        '200':
          description: Emails deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "2 emails deleted from whitelist"

  /health:
    get:
      tags:
        - System
      summary: Health check
      description: Returns the health status of the service and database connection
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "Healthy"
        '503':
          description: Service is unhealthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "Unhealthy"

components:
  schemas:
    CreateUserDto:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          description: User's email address (must be whitelisted)
          example: "student@example.com"
        password:
          type: string
          format: password
          minLength: 6
          description: User's password
          example: "SecurePassword123!"

    LoginDto:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          description: User's email address
          example: "student@example.com"
        password:
          type: string
          format: password
          description: User's password
          example: "SecurePassword123!"

    LoginResponse:
      type: object
      properties:
        message:
          type: string
          example: "Login succesfuld"
        id:
          type: string
          format: uuid
          description: User ID
          example: "123e4567-e89b-12d3-a456-426614174000"
        email:
          type: string
          format: email
          description: User's email address
          example: "student@example.com"
        role:
          type: string
          description: User's role
          enum:
            - Student
            - Administrator
          example: "Student"

    CreateWhitelistEntriesDto:
      type: object
      required:
        - teamName
        - emails
      properties:
        teamName:
          type: string
          description: Name of the team
          example: "DevTeam"
        emails:
          type: array
          items:
            type: string
            format: email
          description: List of email addresses to whitelist
          example:
            - "user1@example.com"
            - "user2@example.com"

    DeleteWhitelistEntriesDto:
      type: object
      required:
        - emails
      properties:
        emails:
          type: array
          items:
            type: string
            format: email
          description: List of email addresses to remove from whitelist
          example:
            - "user1@example.com"
            - "user2@example.com"

    WhitelistEntriesDto:
      type: object
      properties:
        teamName:
          type: string
          description: Name of the team
          example: "DevTeam"
        emails:
          type: array
          items:
            $ref: '#/components/schemas/WhitelistEmailDto'

    WhitelistEmailDto:
      type: object
      properties:
        email:
          type: string
          format: email
          description: Whitelisted email address
          example: "user@example.com"
        status:
          type: string
          description: Status of the whitelist entry
          enum:
            - Pending
            - Approved
            - Rejected
          example: "Approved"

  securitySchemes:
    SignatureAuth:
      type: apiKey
      in: header
      name: X-Signature
      description: |
        HMAC-SHA256 signature of the request body using the client secret.
        Required header: `X-Client-Id` with the client identifier.
        

security:
  - SignatureAuth: []
